<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phish Reporter | TRICK A4IF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; color: #0f172a; font-family: 'Inter', sans-serif; }
        .cyber-card { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .text-accent { color: #2563eb; }
        .bg-accent { background-color: #2563eb; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-6">
        <div class="cyber-card rounded-2xl p-6 flex flex-col md:flex-row justify-between items-center text-center md:text-left">
            <div>
                <h1 class="text-3xl font-bold text-slate-800"><i class="fa-solid fa-fish-fins text-accent"></i> Phish Reporter Pro</h1>
                <p class="text-slate-500 mt-1">Analyze and generate abuse reports for phishing sites.</p>
            </div>
            <div class="mt-4 md:mt-0 px-4 py-2 bg-blue-50 text-blue-700 rounded-lg font-semibold text-sm border border-blue-200">
                TRICK A4IF Security
            </div>
        </div>

        <div class="cyber-card rounded-2xl p-8">
            <h2 class="text-xl font-bold mb-4">Analyze a Phishing Site</h2>
            <form id="reportForm" class="flex flex-col md:flex-row gap-4">
                <input type="text" id="url" required placeholder="Enter Phishing URL (e.g., scam-site.com)" 
                    class="flex-1 bg-slate-50 border border-slate-300 text-slate-800 text-lg rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button type="submit" id="btn" class="bg-accent text-white font-bold py-3 px-8 rounded-xl hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-magnifying-glass" id="btnIcon"></i> <span id="btnText">ANALYZE</span>
                </button>
            </form>
        </div>

        <div id="resultsWrapper" class="hidden space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="cyber-card p-5 rounded-xl border-l-4 border-l-rose-500">
                    <p class="text-sm text-slate-500">Target & IP</p>
                    <p class="font-bold text-slate-800" id="rTarget">-</p>
                    <p class="font-mono text-sm text-rose-600" id="rIp">-</p>
                </div>
                <div class="cyber-card p-5 rounded-xl border-l-4 border-l-blue-500">
                    <p class="text-sm text-slate-500">Hosting Provider</p>
                    <p class="font-bold text-slate-800" id="rIsp">-</p>
                    <p class="text-sm text-slate-600" id="rCountry">-</p>
                </div>
                <div class="cyber-card p-5 rounded-xl border-l-4 border-l-amber-500">
                    <p class="text-sm text-slate-500">Send Takedown To:</p>
                    <p class="font-mono font-bold text-blue-600 break-all" id="rAbuse">-</p>
                </div>
            </div>

            <div class="cyber-card p-6 rounded-2xl">
                <div class="flex justify-between items-center mb-4 border-b border-slate-200 pb-4">
                    <h3 class="text-xl font-bold text-slate-800"><i class="fa-solid fa-file-contract text-rose-500"></i> Auto-Generated Abuse Report</h3>
                    <button onclick="copyReport()" class="text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 py-2 px-4 rounded-lg font-bold transition">
                        <i class="fa-solid fa-copy"></i> Copy Text
                    </button>
                </div>
                <p class="text-sm text-slate-500 mb-2">Copy this draft and email it directly to the hosting provider's abuse team.</p>
                
                <textarea id="abuseDraft" readonly class="w-full h-64 bg-slate-50 border border-slate-300 rounded-lg p-4 font-mono text-sm text-slate-700 focus:outline-none"></textarea>
            </div>

        </div>
    </div>

    <script>
        document.getElementById('reportForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const target = document.getElementById('url').value;
            const btn = document.getElementById('btn'), text = document.getElementById('btnText'), icon = document.getElementById('btnIcon');
            
            document.getElementById('resultsWrapper').classList.add('hidden');
            btn.disabled = true; text.innerText = 'ANALYZING...'; icon.className = 'fa-solid fa-circle-notch fa-spin';

            const formData = new URLSearchParams(); formData.append('url', target);

            try {
                const res = await fetch('/api/scan.php', { method: 'POST', body: formData });
                const data = await res.json();

                if (data.status === 'success') {
                    document.getElementById('rTarget').innerText = data.target;
                    document.getElementById('rIp').innerText = data.ip;
                    document.getElementById('rIsp').innerText = data.isp;
                    document.getElementById('rCountry').innerText = data.country;
                    document.getElementById('rAbuse').innerText = data.abuse_email;

                    // Generate the Legal Abuse Draft
                    const draft = `Subject: URGENT: Phishing / Trademark Abuse Report for ${data.target}

To the Abuse Department at ${data.isp},

My name is Mohammad Mujahidul Islam, representing TRICK A4IF. I am submitting this formal complaint regarding a domain currently hosted on your network.

Offending Domain: ${data.target}
Origin IP Address: ${data.ip}

This website is actively engaged in phishing and brand impersonation. It violates your terms of service and poses a significant security risk to internet users. 

We request the immediate suspension and takedown of this domain to prevent further malicious activity. 

Awaiting your prompt action.

Sincerely,
Mohammad Mujahidul Islam
TRICK A4IF Cyber Community
Timestamp: ${new Date().toUTCString()}`;

                    document.getElementById('abuseDraft').value = draft;
                    document.getElementById('resultsWrapper').classList.remove('hidden');
                } else { alert(`Error: ${data.message}`); }
            } catch (err) { alert('Network Error. Ensure backend is running.'); } 
            finally { btn.disabled = false; text.innerText = 'ANALYZE'; icon.className = 'fa-solid fa-magnifying-glass'; }
        });

        function copyReport() {
            const draft = document.getElementById('abuseDraft');
            draft.select();
            document.execCommand('copy');
            alert('Abuse report copied to clipboard! Open your email and send it to the Abuse Team.');
        }
    </script>
</body>
</html>
